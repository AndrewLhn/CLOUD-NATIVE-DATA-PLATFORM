connector.name=iceberg

# Настройки метастора (JDBC/Postgres)
iceberg.catalog.type=jdbc
iceberg.jdbc-catalog.catalog-name=default
iceberg.jdbc-catalog.driver-class=org.postgresql.Driver
iceberg.jdbc-catalog.connection-url=jdbc:postgresql://airflow-db:5432/airflow
iceberg.jdbc-catalog.connection-user=airflow
iceberg.jdbc-catalog.connection-password=airflow
iceberg.jdbc-catalog.default-warehouse-dir=s3://warehouse/

# Включаем поддержку S3
fs.s3.enabled=true

s3.region=us-east-1
s3.endpoint=http://minio:9000
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin
s3.path-style-access=true